<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Focus</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="../index.html">
                <div class="logo-icon me-2"></div>
                <span class="fw-bold tracking-wider">FOCUS</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html#inicio">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="../index.html#cadastro">Cadastro</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- SEÇÃO LOGIN -->
    <section class="login-section d-flex align-items-center justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7 col-sm-10">
                    <div class="scroll-reveal">
                        <div class="login-form-container">

                            <div class="login-form">

                                <div class="text-center mb-5">
                                    <div class="logo-icon-lg mx-auto mb-3"></div>
                                    <h2 class="form-title mb-2">Bem-vindo ao FOCUS</h2>
                                    <p class="text-muted mb-0">Faça login para acessar sua conta</p>
                                </div>

                                <div class="form-group mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control form-control-custom" id="email"
                                        placeholder="seu@email.com">
                                </div>

                                <div class="form-group mb-3">
                                    <label class="form-label">Senha</label>
                                    <div class="input-group">
                                        <input style="color: white;" type="password"
                                            class="form-control form-control-custom" id="senha" placeholder="Sua senha">
                                    </div>
                                </div>



                                <button onclick="confirmLogin()" class="btn btn-premium w-100 py-2 mb-3">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>
                                    Entrar
                                </button>

                                <div class="divider-text my-4">OU</div>


                                <p class="text-center text-muted font-sm">
                                    Não tem conta?
                                    <a href="../index.html#cadastro" class="link-highlight text-decoration-none">
                                        Criar conta
                                    </a>
                                </p>

                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ALERTA SUCESSO -->
    <div style="display: none;" class="custom-alert alert-success-custom" id="alertBox">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-check-circle-fill"></i>
            <div>
                <h6 class="mb-1">Login realizado com sucesso!</h6>
                <p class="mb-0">Vamos te direcionar para o dashboard.</p>
            </div>
        </div>
        <button class="btn-close-alert" onclick="fecharAlert()">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <!-- ALERTA ERRO -->
    <div style="display: none;" class="custom-alert alert-error-custom" id="alertErro">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-x-circle-fill"></i>
            <div>
                <h6 class="mb-1">Erro no login</h6>
                <p class="mb-0">Email ou senha inválidos. Tente novamente.</p>
            </div>
        </div>
        <button class="btn-close-alert" onclick="fecharErro()">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/login.js"></script>


</body>

</html>
